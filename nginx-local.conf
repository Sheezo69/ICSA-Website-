server {
    listen 8081;
    server_name localhost;

    root /Applications/XAMPP/xamppfiles/htdocs/icsa-international/public;
    index index.php;

    access_log /opt/homebrew/var/log/nginx/icsa-international.access.log;
    error_log /opt/homebrew/var/log/nginx/icsa-international.error.log;

    client_max_body_size 16m;

    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_index index.php;
        fastcgi_pass 127.0.0.1:9000;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/(app|bootstrap|config|database|resources|routes|storage|tests|vendor|__laravel_tmp__|tmp)(/|$) {
        deny all;
        return 404;
    }
}
